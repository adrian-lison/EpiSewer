name: Publish docker backend

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'inst/stan/**'
      - 'docker/fit_EpiSewer.R'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      attestations: write
      id-token: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'

      - name: Install R dependencies for prepare_docker.R
        run: install.packages(c("cmdstanr", "digest", "stringr"), repos = c("https://stan-dev.r-universe.dev", "https://cloud.r-project.org"))
        shell: Rscript {0}

      - name: Cache CmdStan
        id: cache-cmdstan
        uses: actions/cache@v4
        with:
          path: ~/.cmdstan
          key: cmdstan-${{ runner.os }}-${{ hashFiles('inst/stan/stan_digest.txt') }}

      - name: Install CmdStan
        if: steps.cache-cmdstan.outputs.cache-hit != 'true'
        run: cmdstanr::install_cmdstan()
        shell: Rscript {0}

      - name: Run prepare_docker.R
        run: Rscript docker/prepare_docker.R

      - name: Log in to the Container registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 #v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf #v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            GITHUB_PAT=${{ secrets.GITHUB_TOKEN }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Log in to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 #v4.0.0
        with:
          username: adrianlison
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image to Docker Hub
        run: |
          docker buildx imagetools create \
            --tag adrianlison/episewer:latest \
            ${{ env.REGISTRY }}/$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')@${{ steps.push.outputs.digest }}

      - name: Update docker digest file
        run: echo "${{ steps.push.outputs.digest }}" > inst/docker_digest.txt

      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: "Update docker digest to ${{ steps.push.outputs.digest }}"
          title: "Update docker digest"
          body: >
            Automated update of `inst/docker_digest.txt` to the digest of the
            latest published docker image
            (`${{ steps.push.outputs.digest }}`).
            Also includes any changes to `inst/stan/stan_digest.txt`,
            `inst/stan/scalar_data_vars.txt`, and
            `inst/stan/scalar_param_vars.txt` produced by `docker/prepare_docker.R`.
          branch: update-docker-digest
          base: ${{ github.ref_name }}
          delete-branch: true
          add-paths: |
            inst/docker_digest.txt
            inst/stan/stan_digest.txt
            inst/stan/scalar_data_vars.txt
            inst/stan/scalar_param_vars.txt
